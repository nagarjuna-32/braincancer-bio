name: NeuroGen AI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest httpx
        
    - name: Run Pytest Test Suite
      run: |
        python -m pytest tests/ -v

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js 24
      uses: actions/setup-node@v3
      with:
        node-version: "24"
        
    - name: Install Dependencies & Build Next.js
      run: |
        cd frontend
        npm install
        npm run build

  docker-ghcr-push:
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Backend Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./docker/Dockerfile.backend
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/braincancer-bio-backend:latest
          ghcr.io/${{ github.repository_owner }}/braincancer-bio-backend:${{ github.sha }}

    - name: Build and Push Frontend Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./docker/Dockerfile.frontend
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/braincancer-bio-frontend:latest
          ghcr.io/${{ github.repository_owner }}/braincancer-bio-frontend:${{ github.sha }}

