apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neurogen-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - neurogen-ai.com
    secretName: neurogen-tls
  rules:
  - host: neurogen-ai.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: neurogen-gateway-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: neurogen-frontend-service
            port:
              number: 3000
