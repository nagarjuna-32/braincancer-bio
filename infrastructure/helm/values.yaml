replicaCount: 2

image:
  gateway: neurogen/gateway:latest
  frontend: neurogen/frontend:latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  gatewayPort: 8000
  frontendPort: 3000

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: neurogen-ai.com
      paths:
        - path: /api
          pathType: Prefix
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi
